<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meirion Pritchard — Work</title>
<style>
  /* ============================================================
     Meirion Pritchard — Work section
     Step 1: structure + responsiveness (closed list)  [D007]
     Step 2: accordion open/close + project block library
     Built to Figma: 1:192 / 3:1384 / 1:478 / 1:590 (closed),
                     4:1444 (desktop open), 4:2172 (mobile open)
     ============================================================ */

  :root {
    --ink: #000000;
    --paper: #ffffff;
    --border: 2px solid var(--ink);

    --pad-outer: 32px;
    --nav-pad: 32px;
    --row-pad-x: 15px;
    --row-pad-y: 10px;
    --row-gap: 25px;
    --divider-h: 80px;

    --fs-hero: 75px;
    --fs-nav: 25px;
    --fs-row: 75px;
    --row-weight: 400;

    /* project panel type */
    --fs-block-lg: 75px;   /* large body / intro / quote */
    --fs-block-sm: 25px;   /* small body, results, credits, bars */
    --block-pad: 20px;
    --block-pad-x: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .page { display: flex; flex-direction: column; min-height: 100vh; }

  /* ---- header ------------------------------------------------- */
  .s-header {
    display: flex; flex-direction: column;
    padding: var(--pad-outer) var(--pad-outer) 0 var(--pad-outer);
  }
  .c-nav {
    border: var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--nav-pad);
  }
  .c-nav .marks { display: flex; align-items: center; gap: 16px; }

  /* placeholder marks per Figma node 3:2175 */
  .mark { background: var(--ink); flex-shrink: 0; }
  .mark-rect { width: 41px; height: 40px; }
  .mark-circle { width: 40px; height: 40px; border-radius: 100px; }
  .mark-42 { width: 42px; height: 42px; }

  .hero {
    border: var(--border);
    display: flex; align-items: center; overflow: hidden;
    padding: 32px 16px;
  }
  .hero h1 {
    font-size: var(--fs-hero); font-weight: 400;
    letter-spacing: 0.25px; line-height: normal; white-space: nowrap;
  }

  .nav-row { display: flex; width: 100%; }
  .nav-item {
    border: var(--border); flex: 1 0 0; min-width: 0;
    display: flex; align-items: center; gap: 15px; padding: 20px 15px;
  }
  .nav-item .bullet {
    width: 16px; height: 16px; border: 2px solid var(--ink);
    border-radius: 50%; flex-shrink: 0;
  }
  .nav-item span {
    font-size: var(--fs-nav); font-weight: 700; letter-spacing: 0.25px;
  }

  /* ---- work section ------------------------------------------ */
  .s-work {
    display: flex; flex-direction: column;
    padding: 0 var(--pad-outer) var(--pad-outer) var(--pad-outer);
  }

  .row {
    border: var(--border);
    display: flex; align-items: center; gap: var(--row-gap);
    overflow: hidden; padding: var(--row-pad-y) var(--row-pad-x);
    cursor: pointer;
  }
  .row .label {
    font-size: var(--fs-row); font-weight: var(--row-weight);
    letter-spacing: 0.25px; line-height: normal; white-space: nowrap;
    flex-shrink: 0;
  }
  .row .divider {
    width: 2px; height: var(--divider-h); background: var(--ink);
    flex-shrink: 0;
  }
  .row .value {
    font-size: var(--fs-row); font-weight: var(--row-weight);
    letter-spacing: 0.25px; line-height: normal;
    flex: 1 0 0; min-width: 0; text-align: right;
  }
  /* open row: bottom border drops so it joins the panel */
  .row.is-open { border-bottom: none; }

  /* collapse borders */
  .nav-row { margin-top: -2px; }
  .nav-item + .nav-item { margin-left: -2px; }
  .row { margin-top: -2px; }
  .hero { margin-top: -2px; }

  /* ---- project panel (open state) ---------------------------- */
  .panel {
    border-left: var(--border);
    border-right: var(--border);
    border-bottom: var(--border);
    margin-top: -2px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* each block is a bordered cell, white */
  .block {
    border: var(--border);
    margin-top: -2px;
    background: var(--paper);
    padding: var(--block-pad) var(--block-pad-x);
  }
  .block:first-child { margin-top: 0; }

  /* a section bar: circle icon + bold label */
  .bar {
    border: var(--border);
    margin-top: -2px;
    background: var(--paper);
    display: flex; align-items: center; gap: 15px;
    padding: 15px var(--row-pad-x); min-height: 50px;
  }
  .bar .bullet {
    width: 16px; height: 16px; border: 2px solid var(--ink);
    border-radius: 50%; flex-shrink: 0;
  }
  .bar .bar-label {
    font-size: var(--fs-block-sm); font-weight: 700; letter-spacing: 0.25px;
    flex: 1 0 0; min-width: 0;
  }
  .bar.bar-right { justify-content: flex-end; }
  .bar.bar-right .bar-label { text-align: right; }

  /* image placeholders — real assets are on Figma localhost */
  .img-ph {
    border: var(--border);
    background:
      repeating-linear-gradient(45deg,
        #ddd 0, #ddd 1px, transparent 1px, transparent 11px),
      #f4f4f4;
    width: 100%;
  }
  .img-frame   { aspect-ratio: 1764 / 972.5; }   /* full-width hero */
  .img-portrait{ aspect-ratio: 576 / 972.5; }     /* tall portrait */
  .img-square  { aspect-ratio: 875 / 972.5; }
  .img-tall    { aspect-ratio: 869 / 972.5; }

  .photo-row { display: flex; gap: 20px; }
  .photo-row .img-ph { flex: 1 0 0; min-width: 0; }

  /* text blocks */
  .text-lg {
    font-size: var(--fs-block-lg); font-weight: 400;
    letter-spacing: 0.25px; line-height: normal;
  }
  .text-sm {
    font-size: var(--fs-block-sm); font-weight: 500; /* Medium */
    letter-spacing: 0.25px; line-height: normal; white-space: pre-wrap;
  }

  /* split block: large text + portrait image side by side */
  .split { display: flex; gap: 25px; align-items: stretch; }
  .split .split-text {
    flex: 1 0 0; min-width: 0;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .split .split-text .secondary {
    font-size: var(--fs-block-sm); font-weight: 500; max-width: 415px;
    margin-top: 25px;
  }
  .split .img-ph { flex: 1 0 0; min-width: 0; }

  /* results / credits two-column */
  .two-col { display: flex; }
  .two-col > div { flex: 1 0 0; min-width: 0; }
  .two-col .col-credits .bar { justify-content: flex-end; }
  .two-col .col-credits .bar .bar-label { text-align: right; }
  .two-col .col-credits .text-sm { text-align: right; }
  .col-body { border: var(--border); margin-top: -2px; padding: var(--block-pad) var(--block-pad-x); }

  /* close bar */
  .close-bar {
    border: var(--border); margin-top: -2px; background: var(--paper);
    display: flex; align-items: center; justify-content: flex-end; gap: 15px;
    padding: 15px var(--row-pad-x); min-height: 50px; cursor: pointer;
  }
  .close-bar .close-label {
    font-size: var(--fs-block-sm); font-weight: 700; letter-spacing: 0.25px;
  }
  .close-bar .close-icon {
    width: 16px; height: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; line-height: 1;
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 1024px) {
    :root {
      --fs-row: 45px; --row-weight: 500; --divider-h: 60px;
      --fs-block-lg: 45px;
    }
  }

  @media (max-width: 640px) {
    :root {
      --pad-outer: 16px; --row-pad-x: 15px; --row-pad-y: 6px;
      --row-gap: 12px; --divider-h: 30px;
      --fs-hero: 55px; --fs-nav: 18px; --fs-row: 18px; --row-weight: 700;
      --fs-block-lg: 20px; --fs-block-sm: 16px;
      --block-pad: 12px; --block-pad-x: 12px;
    }
    .c-nav { padding: 32px 16px; }
    .c-nav .marks { gap: 12px; }
    .nav-item { gap: 8px; padding: 10px 15px; }
    .nav-item .bullet { width: 13px; height: 13px; }
    .row .divider { width: 1px; }
    .bar .bullet, .close-bar .close-icon { width: 13px; height: 13px; }
    .photo-row { gap: 8px; }
    .split { flex-direction: column; gap: 12px; }
    .two-col { flex-direction: column; }     /* results/credits stack */
    .two-col .col-credits .bar,
    .two-col .col-credits .bar .bar-label,
    .two-col .col-credits .text-sm { text-align: left; justify-content: flex-start; }
    .split .secondary { display: none; }      /* mobile drops the secondary caption */
  }
</style>
</head>
<body>
<div class="page">

  <header class="s-header">
    <div class="c-nav">
      <div class="marks">
        <div class="mark mark-rect" data-name="nav-item-01"></div>
        <div class="mark mark-circle" data-name="nav-item-02"></div>
      </div>
      <div class="marks">
        <div class="mark mark-circle" data-name="nav-item-03"></div>
        <div class="mark mark-circle mark-42" data-name="nav-item-04"></div>
        <div class="mark mark-circle" data-name="nav-item-05"></div>
      </div>
    </div>

    <div class="hero"><h1>Work</h1></div>

    <div class="nav-row">
      <div class="nav-item"><span class="bullet"></span><span>Work</span></div>
      <div class="nav-item"><span class="bullet"></span><span>About</span></div>
    </div>
    <div class="nav-row">
      <div class="nav-item"><span class="bullet"></span><span>Articles</span></div>
      <div class="nav-item"><span class="bullet"></span><span>Contact</span></div>
    </div>
  </header>

  <main class="s-work" id="work-list"></main>

</div>

<script>
  // ---- data model -------------------------------------------------
  // A project closed-row shows [title|category|value]; when open it
  // shows an ordered list of typed blocks. This mirrors the Phase 7
  // CMS schema: each block type becomes a content type.
  //
  // Block types (from Figma 4:1444 / 4:2172):
  //   photo        — full-width hero image
  //   photoRow     — 2-up / 3-up image row
  //   caption      — section bar + body text (size: 'lg' | 'sm')
  //   split        — large text + portrait image, with secondary caption
  //   resultsCredits — two-column results (left) / credits (right)

  const closedRow = { title: "Wallpaper*", category: "Awards", value: "360°" };

  const airEverywhere = {
    title: "Air Everywhere", category: "Nike", value: "Campaign",
    blocks: [
      { type: "photo", variant: "frame" },
      { type: "caption", label: "Intro", size: "lg",
        text: "The campaign was capped off with a two day Nike By You event at Salone del Mobile in Milan, Italy." },
      { type: "photoRow", count: 3, variant: "portrait" },
      { type: "photoRow", count: 2, variant: "square" },
      { type: "photo", variant: "frame" },
      { type: "caption", label: "Section title", size: "lg",
        text: "The campaign took inspiration from Heron Preston’s utilitarian, sustainable brand and combined it with the concept of 360 degrees of air (itself inspired by the shoes’s design where the iconic air bubble wrapped up over the foot), literally re-using scraps from Nike’s top secret Air bubble factory in Beaverton, OR." },
      { type: "caption", label: "Section title", size: "lg",
        text: "The campaign was capped off with a two day Nike By You event at Salone del Mobile in Milan, Italy." },
      { type: "split", label: "Section title",
        text: "The campaign was capped off with a two day Nike By You event at Salone del Mobile in Milan, Italy.",
        secondary: "The campaign was capped off with a two day Nike By You event at Salone del Mobile in Milan, Italy." },
      { type: "caption", label: "Section title", size: "sm",
        text: "The campaign was capped off with a two day Nike By You event at Salone del Mobile in Milan, Italy. Hosted by Heron himself avid Heron Preston fans and sneaker heads got to work with the materials in-hand and design their very own AirMax 95 or 720. The whole event was broadcast live via Heron’s Instagram channel." },
      { type: "caption", label: "Section title", size: "sm",
        text: "The campaign was capped off with a two day Nike By You event at Salone del Mobile in Milan, Italy." },
      { type: "resultsCredits",
        results: "We reached over 34M people during Milan’s Salone Del Mobile.\n2400 members registered for the maker workshops with Heron.\nAll 4000 units sold out in one day on Nike.com.",
        credits: "Creative Director: Meirion Pritchard\nArt Director: Noah Beckwith\nDigital Designers: Allison Olson, Jana Raport\nCreative Producer: Adam Bordow\n\nPhotographer: Thomas Albdorf\nSet Design: Georgina Pragnell" }
    ]
  };

  // seven rows; row index 4 (the 5th) is the case study, like the design
  const projects = [
    closedRow, closedRow, closedRow, closedRow,
    airEverywhere,
    closedRow, closedRow
  ];

  // ---- block renderers -------------------------------------------
  function imgPh(variantClass) {
    return '<div class="img-ph ' + variantClass + '"></div>';
  }

  function renderBlock(b) {
    switch (b.type) {
      case "photo":
        return '<div class="block">' + imgPh("img-frame") + '</div>';

      case "photoRow": {
        const v = b.variant === "portrait" ? "img-portrait"
                : b.variant === "square"   ? "img-square" : "img-tall";
        let imgs = "";
        for (let i = 0; i < b.count; i++) imgs += imgPh(v);
        return '<div class="block"><div class="photo-row">' + imgs + '</div></div>';
      }

      case "caption": {
        const sizeClass = b.size === "lg" ? "text-lg" : "text-sm";
        return '' +
          '<div class="bar"><span class="bullet"></span>' +
          '<span class="bar-label">' + b.label + '</span></div>' +
          '<div class="block"><div class="' + sizeClass + '">' + b.text + '</div></div>';
      }

      case "split":
        return '' +
          '<div class="bar"><span class="bullet"></span>' +
          '<span class="bar-label">' + b.label + '</span></div>' +
          '<div class="block"><div class="split">' +
            '<div class="split-text">' +
              '<div class="text-lg">' + b.text + '</div>' +
              '<div class="secondary">' + b.secondary + '</div>' +
            '</div>' +
            imgPh("img-tall") +
          '</div></div>';

      case "resultsCredits":
        return '' +
          '<div class="two-col">' +
            '<div class="col-results">' +
              '<div class="bar"><span class="bullet"></span><span class="bar-label">Results</span></div>' +
              '<div class="col-body"><div class="text-sm">' + b.results + '</div></div>' +
            '</div>' +
            '<div class="col-credits">' +
              '<div class="bar bar-right"><span class="bar-label">Credits</span><span class="bullet"></span></div>' +
              '<div class="col-body"><div class="text-sm">' + b.credits + '</div></div>' +
            '</div>' +
          '</div>';

      default: return "";
    }
  }

  function renderPanel(p) {
    let inner = p.blocks.map(renderBlock).join("");
    inner += '<div class="close-bar" data-close="1">' +
               '<span class="close-label">Close</span>' +
               '<span class="close-icon">&#10005;</span></div>';
    return '<div class="panel">' + inner + '</div>';
  }

  // ---- list render + accordion behaviour -------------------------
  const list = document.getElementById("work-list");
  let openIndex = null;   // one-at-a-time

  function render() {
    list.innerHTML = "";
    projects.forEach((p, i) => {
      const isOpen = (i === openIndex && p.blocks);
      const row = document.createElement("div");
      row.className = "row" + (isOpen ? " is-open" : "");
      row.dataset.index = i;
      row.innerHTML =
        '<span class="label">' + p.title + '</span>' +
        '<span class="divider"></span>' +
        '<span class="label">' + p.category + '</span>' +
        '<span class="value">' + p.value + '</span>';
      list.appendChild(row);

      if (isOpen) {
        const wrap = document.createElement("div");
        wrap.innerHTML = renderPanel(p);
        list.appendChild(wrap.firstChild);
      }
    });
  }

  list.addEventListener("click", (e) => {
    const closeBar = e.target.closest(".close-bar");
    if (closeBar) { openIndex = null; render(); return; }

    const row = e.target.closest(".row");
    if (!row) return;
    const i = parseInt(row.dataset.index, 10);
    if (!projects[i].blocks) return;          // closed-only rows do nothing
    openIndex = (openIndex === i) ? null : i; // toggle; one at a time
    render();
  });

  render();
</script>
</body>
</html>
